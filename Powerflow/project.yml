name: Powerflow
options:
  bundleIdPrefix: com.powerflow
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
targets:
  Powerflow:
    type: application
    platform: macOS
    sources:
      - path: Powerflow
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.powerflow.app
        INFOPLIST_FILE: Powerflow/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        ENABLE_DEBUG_DYLIB: NO
    info:
      path: Powerflow/Info.plist
      properties:
        CFBundleName: powerflow
        CFBundleDisplayName: Powerflow
        CFBundleShortVersionString: "0.3.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright © 2026 Powerflow contributors"
