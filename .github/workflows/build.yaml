name: build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'Powerflow/**'
      - '.github/workflows/build.yaml'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Powerflow
        run: xcodegen generate

      - name: Build universal macOS app
        working-directory: Powerflow
        run: |
          xcodebuild \
            -scheme Powerflow \
            -configuration Release \
            -destination 'platform=macOS' \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package DMG (release tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: Powerflow
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name 'Powerflow.app' -path '*/Release/*' | head -1)
          mkdir -p dist
          hdiutil create -volname Powerflow -srcfolder "$APP_PATH" -ov -format UDZO dist/Powerflow.dmg

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: Powerflow/dist/Powerflow.dmg
          draft: true
          generate_release_notes: true
